type UserNotificationType implements BaseNotificationType {
  id: Int
  notificationType: NotificationEnum
  time: DateTime
  user: UserType
}

interface BaseNotificationType {
  id: Int
  notificationType: NotificationEnum
  time: DateTime
}

"""An enumeration."""
enum NotificationEnum {
  NEW_FOLLOWER
  EVENT_FINISHED
}

"""
The `DateTime` scalar type represents a DateTime
value as specified by
[iso8601](https://en.wikipedia.org/wiki/ISO_8601).
"""
scalar DateTime

type UserType {
  id: Int

  """
  Designates whether this user should be treated as active. Unselect this instead of deleting accounts.
  """
  isActive: Boolean!
  dateJoined: DateTime!
  username: String!
  bio: String!
  gender: Gender
  firstName: String!
  lastName: String!
  xp: Int!
  verified: Boolean!
  preferredActivities: [PreferredActivityType!]!
  likes: Int
  dislikes: Int
  followers: [UserType]
  followerCount: Int
  following: [UserType]
  followingCount: Int
  organizingEvents: [EventType]
  attendingEvents: [EventType]
  posts(start: Int = 0, end: Int = 10): [PostType]
  location: LocationType
  email: String
  dateOfBirth: Date
  isFollowing: Boolean
  isFollowedBy: Boolean
  frequencyOfPhysicalActivity: String
  socialInteractionImportance: String
  preferredPartySize: String
  physicalActivitySatisfaction: String
  matchedParticipationLikelihood: String
  mainInterest: String
}

"""An enumeration."""
enum Gender {
  MALE
  FEMALE
  NON_BINARY
  PREFER_NOT_TO_SAY
}

