fragment ChatMember on ChatMemberType {
  user {
    id
    username
    firstName
    lastName
    profileImageUrl
  }
  lastOpen
}

fragment ChatMessage on ChatMessageType {
  id
  user {
    id
  }
  kind
  targetUser {
    id
    username
    firstName
    lastName
  }
  textContent
  timeSent
  attachmentUrl
}

fragment Chat on ChatType {
  id
  kind
  groupName
  lastMessage {
    ...ChatMessage
  }
  members {
    ...ChatMember
  }
  allMembers: members(includeFormer: true) {
    ...ChatMember
  }
}

fragment WSChatMessage on WSChatMessageType {
  id
  userId
  kind
  targetUserId
  textContent
  timeSent
  attachmentUrl
}