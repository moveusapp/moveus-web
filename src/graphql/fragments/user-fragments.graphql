fragment UserPreferences on UserPreferencesType {
  preferredSessionDuration
  organizingOpenness
  leadershipInclination
  maxTravelDistance
  weeklyActivityTarget
  pushesThroughDiscomfort
  preferredGroupSize
  acquaintancePreference
  enjoysMeetingNewPeople
  activityVsSocial
  motivatedByCompetition
  planningHorizon
  feelsLikeBurden
  participationGroups
  availabilities {
    dayOfWeek
    timeOfDay
  }
}

fragment Survey on ProfileType {
  preferences {
    ...UserPreferences
  }
  preferredActivities {
    activity
    skillLevel
  }
}

fragment BasicInfo on ProfileType {
  firstName
  lastName
  bio
  dateOfBirth
  gender
}

fragment ContextProfile on ProfileType{
  id
  username
  lastLogin
  isCapeable
  lastName
  verified
  profileImageUrl
  likes
  dislikes
  followerCount
  followingCount
  ...BasicInfo
  ...Survey
  privacySettings {
    setting
    scope
  }
  attendingEvents {
    ...EventCard
  }
  organizingEvents {
    ...EventCard
  }
}

fragment User on UserType {
  id
  username
  bio
  gender
  firstName
  lastName
  profileImageUrl
  likes
  dislikes
  dateOfBirth
  location {
    city
    region
    name
  }
  followerCount
  followingCount
  verified
  isFollowing
  isFollowedBy
  attendingEvents {
    ...EventCard
  }
  organizingEvents {
    ...EventCard
  }
  posts {
    ...PostCard
  }
}

fragment UserCard on UserType {
  id
  username
  firstName
  lastName
  verified
  profileImageUrl
}
