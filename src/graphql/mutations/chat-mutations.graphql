mutation CreateGroupChat($name: String, $userIds: [Int!]!) {
  createGroupChat(name: $name, userIds: $userIds) {
    chat {
      id
    }
  }
}

mutation CreateDirectChat($userId: Int!) {
  createDirectChat(userId: $userId) {
    chat {
      id
      kind
      groupName
      lastMessage {
        id
      }
      members {
        user {
          id
          username
          firstName
          lastName
        }
      }
    }
  }
}

mutation SetChatNickname($chatId: Int!, $nickname: String!) {
  setChatNickname(chatId: $chatId, nickname: $nickname) {
    chatMember {
      nickname
      user {
        id
      }
    }
  }
}

mutation AddChatMember($chatId: Int!, $userId: Int!) {
  addChatMember(chatId: $chatId, userId: $userId) {
    chat {
      id
      members {
        user {
          id
          username
          firstName
          lastName
        }
      }
    }
  }
}

mutation LeaveChat($chatId: Int!) {
  leaveChat(chatId: $chatId) {
    success
  }
}

mutation SendChatMessage (
  $chatId: Int!,
  $message: String,
  $attachmentId: String
) {
  sendChatMessage (
    chatId: $chatId,
    message: $message,
    attachmentId: $attachmentId
  ) {
    chatMessage {
      ...ChatMessage
    }
  }
}