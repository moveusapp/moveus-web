mutation CreateDirectChat($userId: Int!) {
  createDirectChat(userId: $userId) {
    chat {
      id
      kind
      groupName
      lastMessage {
        id
      }
      members {
        user {
          id
          username
          firstName
          lastName
        }
      }
    }
  }
}

mutation SendChatMessage (
  $chatId: Int!,
  $message: String,
  $attachmentId: String
) {
  sendChatMessage (
    chatId: $chatId,
    message: $message,
    attachmentId: $attachmentId
  ) {
    chatMessage {
      ...ChatMessage
    }
  }
}