mutation Login($user: String!, $password: String!, $rememberMe: Boolean!) {
  login (
    user: $user,
    password: $password,
    rememberMe: $rememberMe
  ) {
    myProfile {
      ...ContextProfile
    }
  }
}

mutation SignUp($username: String!, $password: String!, $email: String!, $rememberMe: Boolean!) {
  signUp (
    username: $username,
    email: $email,
    password: $password,
    rememberMe: $rememberMe
  ) {
    myProfile { 
      ...ContextProfile
    }
  }
}

mutation LogOut {
  logout {
    success
  }
}

mutation ConfirmEmail($code: String!) {
  confirmEmail(code: $code) {
    myProfile {
      ...ContextProfile
    }
  }
}

mutation ResendVerificationCode($email: String!) {
  resendVerificationCode(email: $email) {
    success
  }
}