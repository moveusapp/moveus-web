mutation AlterLocation($latitude: Float!, $longitude: Float!) {
  alterProfileLocation(latitude: $latitude, longitude: $longitude) {
    success
  }
}

mutation AlterProfileBasicInfo(
  $firstName: String,
  $lastName: String,
  $bio: String,
  $dateOfBirth: Date,
  $gender: Gender
) {
  alterBasicInfo (
    firstName: $firstName,
    lastName: $lastName,
    bio: $bio,
    dateOfBirth: $dateOfBirth,
    gender: $gender
  ) {
    myProfile {
      ...ContextProfile
    }
  }
}

mutation AlterProfileSurveyInfo(
  $preferredActivities: [PreferredActivityInput]
  $preferredSessionDuration: Int
  $organizingOpenness: OrganizingOpenness
  $leadershipInclination: Int
  $availabilities: [AvailabilityInput]
  $maxTravelDistance: Int
  $weeklyActivityTarget: Int
  $pushesThroughDiscomfort: Int
  $preferredGroupSize: Int
  $participationGroups: [ParticipationGroupKind]
  $acquaintancePreference: AcquaintancePreference
  $enjoysMeetingNewPeople: Int
  $activityVsSocial: Int
  $motivatedByCompetition: Int
  $planningHorizon: Int
  $feelsLikeBurden: Int
) {
  alterSurveyInfo(
    preferredActivities: $preferredActivities
    preferredSessionDuration: $preferredSessionDuration
    organizingOpenness: $organizingOpenness
    leadershipInclination: $leadershipInclination
    availabilities: $availabilities
    maxTravelDistance: $maxTravelDistance
    weeklyActivityTarget: $weeklyActivityTarget
    pushesThroughDiscomfort: $pushesThroughDiscomfort
    preferredGroupSize: $preferredGroupSize
    participationGroups: $participationGroups
    acquaintancePreference: $acquaintancePreference
    enjoysMeetingNewPeople: $enjoysMeetingNewPeople
    activityVsSocial: $activityVsSocial
    motivatedByCompetition: $motivatedByCompetition
    planningHorizon: $planningHorizon
    feelsLikeBurden: $feelsLikeBurden
  ) {
    myProfile {
      ...ContextProfile
    }
  }
}
