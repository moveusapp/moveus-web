mutation AlterAllPrivacySettings($scope: PrivacyScope!) {
  alterAllPrivacySettings(scope: $scope) {
    success
  }
}

mutation AlterPrivacySetting(
  $setting: PrivacySetting!
	$scope: PrivacyScope!
) {
	alterPrivacySetting(
    setting: $setting
    scope: $scope
  ) {
    privacySetting {
      setting
      scope
    }
  }
}

mutation DeleteAccount {
  deleteAccount {
    success
  }
}

