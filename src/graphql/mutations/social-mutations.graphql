mutation FollowUser($userId: Int!) {
  followUser(userId: $userId) {
    follow {
      timeCreated
      user {
        ...UserCard
      }
    }
  }
}

mutation UnfollowUser($userId: Int!) {
  unfollowUser(userId: $userId) {
    success
  }
}

mutation CreatePost(
  $content: String!
  $eventId: Int
  $withPicture: Boolean!
  $contentType: String = ""
) {
  createPost(content: $content, eventId: $eventId) {
    post {
      id
      postPictureUrl(contentType: $contentType) @include(if: $withPicture)
    }
  }
}

mutation LikePost($postId: Int!) {
  likePost(postId: $postId) {
    success
  }
}

mutation UnlikePost($postId: Int!) {
  unlikePost(postId: $postId) {
    success
  }
}

mutation CommentOnPost($postId: Int!, $text: String!) {
  commentOnPost(postId: $postId, text: $text) {
    comment {
      ...Comment
    }
  }
}

mutation CommentOnEvent($eventId: Int!, $text: String!) {
  commentOnEvent(eventId: $eventId, text: $text) {
    comment {
      ...Comment
    }
  }
}

mutation ReplyOnComment($commentId: Int!, $text: String!) {
  replyOnComment(commentId: $commentId, text: $text) {
    comment {
      ...Comment
    }
  }
}

mutation LikeComment($commentId: Int!) {
  likeComment(commentId: $commentId) {
    success
  }
}

mutation UnlikeComment($commentId: Int!) {
  unlikeComment(commentId: $commentId) {
    success
  }
}
