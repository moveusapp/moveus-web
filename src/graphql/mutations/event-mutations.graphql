mutation CreateEvent(
  $title: String!
  $description: String
  $startTime: DateTime!
  $endTime: DateTime!
  $requirements: String
  $locationName: String
  $locationAddressLine1: String
  $locationAddressLine2: String
  $locationCountryCode: CountryCode
  $locationRegion: String
  $locationZipCode: Int
  $locationLatitude: Float
  $locationLongitude: Float
  $activity: ActivityKind!
  $skillLevel: SkillLevel!
  $maxParticipants: Int
  $allowSpectators: Boolean
  $minAge: Int
  $maxAge: Int
  $acceptedGenders: [GenderNoPNTS!]
) {
  createEvent(
    title: $title
    description: $description
    startTime: $startTime
    endTime: $endTime
    requirements: $requirements
    locationName: $locationName
    locationAddressLine1: $locationAddressLine1
    locationAddressLine2: $locationAddressLine2
    locationCountryCode: $locationCountryCode
    locationRegion: $locationRegion
    locationZipCode: $locationZipCode
    locationLatitude: $locationLatitude
    locationLongitude: $locationLongitude
    activity: $activity
    skillLevel: $skillLevel
    maxParticipants: $maxParticipants
    allowSpectators: $allowSpectators
    minAge: $minAge
    maxAge: $maxAge
    acceptedGenders: $acceptedGenders
  ) {
    event {
      id
    }
  }
}

mutation JoinEvent($eventId: Int!) {
  joinEvent(eventId: $eventId) {
    event {
      ...Event
    }
    member {
      ...EventMember
    }
  }
}

mutation LeaveEvent($eventId: Int!) {
  leaveEvent(eventId: $eventId) {
    event {
      ...Event
    }
  }
}

mutation AlterEvent(
  $eventId: Int!
  $title: String
  $description: String
  $startTime: DateTime
  $endTime: DateTime
  $maxParticipants: Int
) {
  alterEvent(
    eventId: $eventId
    title: $title
    description: $description
    startTime: $startTime
    endTime: $endTime
    maxParticipants: $maxParticipants
  ) {
    event {
      ...Event
    }
  }
}

mutation DeleteEvent($eventId: Int!) {
  deleteEvent(eventId: $eventId) {
    success
  }
}

mutation CancelEvent($eventId: Int!) {
  cancelEvent(eventId: $eventId) {
    event {
      ...Event
    }
  }
}