subscription ChatMessages ($chatId: Int!) {
  chatMessages(chatId: $chatId) {
    ...WSChatMessage
  }
}

subscription LastOpen($chatId: Int!) {
  chatLastOpen(chatId: $chatId) {
    userId
    lastOpen
  }
}

subscription MyChats {
  myChats {
    eventType
    chatId
    lastMessage {
      ...WSChatMessage
    }
    chat {
      id
      timeCreated
      members {
        userId
        nickname
        lastOpen
      }
      lastMessage {
        ...WSChatMessage
      }
    }
    member {
      userId
      nickname
      lastOpen
    }
    removedUserId
  }
}
