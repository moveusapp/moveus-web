query GetMyProfile {
    myProfile {
        ...ContextProfile
    }
}

query GetProfileImageUpload($contentType: String!) {
  profileImageUpload(contentType: $contentType) {
    ...UploadTicket
  }
}

query GetNotifications {
  myNotifications(lastFetch: "1971-01-01") {
    id
    time
    notificationType
    ... on UserNotificationType {
      user {
        id
        username
        firstName
        lastName
        profileImageUrl
      }
    }
    ... on EventNotificationType {
      event {
        id
        title
      }
    }
  }
}
