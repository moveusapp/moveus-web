query GetMyProfile {
    myProfile {
        ...ContextProfile
    }
}

query GetProfilePictureUploadURL($contentType: String!) {
  profilePictureUrl(contentType: $contentType)
}

query GetNotifications {
  myNotifications(lastFetch: "1971-01-01") {
    id
    time
    notificationType
    ... on UserNotificationType {
      user {
        id
        username
        firstName
        lastName
      }
    }
    ... on EventNotificationType {
      event {
        id
        title
      }
    }
  }
}
