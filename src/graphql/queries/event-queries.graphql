query GetEvent($eventId: Int!) {
  event(id: $eventId) {
    ...Event
  }
}

query GetAnonymousUserEvents {
  anonymousUserEvents {
    ...EventCard
  }
}

query GetEventImageUpload($eventId: Int!, $contentType: String!) {
  eventImageUpload(eventId: $eventId, contentType: $contentType) {
    ...UploadTicket
  }
}

query GetUnratedEvents {
  unratedEvents {
    id
    title
    endTime
    activity {
      id
    }
  }
}
