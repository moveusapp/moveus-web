query GetUserChat($userId: Int!) {
  userChat (userId: $userId) {
    id
    members {
      user {
        id
        username
        firstName
        lastName
      }
    }
  }
}

query GetChat($chatId: Int!) {
  chat(chatId: $chatId) {
    id
    members {
      user {
        id
        username
        firstName
        lastName
      }
    }
  }
}

query GetAttachmentUploadURL {
  newAttachment {
    id
    url
  }
}