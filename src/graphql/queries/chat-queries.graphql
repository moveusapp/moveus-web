query GetChat($chatId: Int!) {
  chat(chatId: $chatId) {
    id
    kind
    groupName
    lastMessage {
      id
    }
    members {
      user {
        id
        username
        firstName
        lastName
      }
    }
  }
}

query GetAttachmentUploadURL {
  newAttachment {
    id
    url
  }
}