query GetChat($chatId: Int!) {
  chat(chatId: $chatId) {
    id
    kind
    groupName
    lastMessage {
      id
    }
    members {
      nickname
      user {
        id
        username
        firstName
        lastName
        avatarUrl
        badge
      }
    }
    allMembers: members(includeFormer: true) {
      nickname
      user {
        id
        username
        firstName
        lastName
        avatarUrl
        badge
      }
    }
  }
}

query GetAttachmentUpload($contentType: String!) {
  newAttachment(contentType: $contentType) {
    id
    upload {
      ...UploadTicket
    }
  }
}
